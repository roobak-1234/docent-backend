# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - docent-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C7FAF0320F2B4CDDA449CB43BB26B746 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6EE3A3ECF62747CEBF861FCB1D03A2AE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A78123B721E84AD2A1160DDFF5EC1A05 }}

      - name: Configure Azure Web App settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name docent-backend \
              --resource-group ${{ secrets.AZURE_BACKEND_RESOURCE_GROUP }} \
              --settings \
                ConnectionStrings__DefaultConnection='${{ secrets.BACKEND_DB_CONNECTION_STRING }}' \
                ASPNETCORE_ENVIRONMENT='Production'

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'docent-backend'
          slot-name: 'Production'
          package: .
          